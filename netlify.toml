[build]
  command = "cd dapp && npm install --legacy-peer-deps && npm run build"
  publish = "."

# 资源文件优先（必须放在最前面）
[[redirects]]
  from = "/dapp/assets/*"
  to = "/dapp/dist/assets/:splat"
  status = 200

[[redirects]]
  from = "/dapp"
  to = "/dapp/dist/index.html"
  status = 200

[[redirects]]
  from = "/dapp/"
  to = "/dapp/dist/index.html"
  status = 200

[[redirects]]
  from = "/dapp/*"
  to = "/dapp/dist/index.html"
  status = 200
